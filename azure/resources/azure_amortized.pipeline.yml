resources:
  pipelines:
    azure_amortized_pipeline:
      name: azure_amortized_pipeline
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      libraries:
        - notebook:
            path: ../src/azure_amortized_pipeline.ipynb

      configuration:
        bundle.sourcePath: ${workspace.file_path}/src
        source_file_path: ${var.amortized_source_file_path}
        bronze_table_name: ${var.amortized_bronze_table_name}
        silver_table_name: ${var.amortized_silver_table_name}
        gold_table_name: ${var.amortized_gold_table_name}
        billing_period_depth: ${var.amortized_billing_period_depth}
        ingestion_date_depth: ${var.amortized_ingestion_date_depth}
